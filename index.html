<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grant Incorporated</title>
    <style>
        /* TERMINAL THEME STYLES */
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Courier New', Courier, monospace; /* Classic terminal font */
            margin: 0;
            padding: 0;
        }
        h1 {
            text-align: center;
            color: #58a6ff;
            margin-top: 30px;
            font-size: 36px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        /* NEWS TICKER STYLES */
        .news-ticker-wrap {
            width: 100%;
            background-color: #161b22;
            border-bottom: 2px solid #30363d;
            overflow: hidden;
            white-space: nowrap;
            padding: 12px 0;
        }
        .news-ticker {
            display: inline-block;
            padding-left: 100%;
            animation: ticker-scroll 40s linear infinite;
        }
        .news-item {
            margin-right: 60px;
            font-size: 16px;
            color: #c9d1d9;
            font-family: Arial, sans-serif;
        }
        .news-item a {
            color: #00ff88; /* Neon green links */
            text-decoration: none;
            font-weight: bold;
        }
        .news-item a:hover {
            text-decoration: underline;
        }
        @keyframes ticker-scroll {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        /* STOCK BOARD STYLES */
        .board {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 40px;
        }
        .stock-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            width: 220px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .symbol { font-size: 28px; font-weight: bold; margin-bottom: 10px; color: #ffffff;}
        .price { font-size: 32px; margin: 10px 0; }
        .green { color: #3fb950; }
        .red { color: #f85149; }
    </style>
</head>
<body>

    <div class="news-ticker-wrap">
        <div class="news-ticker" id="news-ticker-box">
            <span class="news-item">Booting up Grant Incorporated Terminal... Fetching live market news...</span>
        </div>
    </div>

    <h1>Grant Incorporated</h1>

    <div class="board" id="stock-board">
        <h2 style="color: #8b949e;">Loading live market data...</h2>
    </div>

    <script>
        // 1. FETCH LIVE YAHOO FINANCE NEWS
        async function loadNews() {
            try {
                const response = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://finance.yahoo.com/news/rss');
                const data = await response.json();
                
                let newsHTML = '';
                data.items.forEach(article => {
                    newsHTML += `<span class="news-item">📰 <a href="${article.link}" target="_blank">${article.title}</a></span>`;
                });
                
                document.getElementById('news-ticker-box').innerHTML = newsHTML;
            } catch (error) {
                console.log("Error loading news: ", error);
            }
        }
        loadNews(); // Start news immediately

        // 2. FETCH STOCK DATA FROM YOUR NETLIFY BACKEND
        async function loadStocks() {
            try {
                // Calls your secret Netlify function
                const response = await fetch('/.netlify/functions/yahoo');
                const stocks = await response.json();
                
                let boardHTML = '';
                
                stocks.forEach(stock => {
                    // Figure out if the stock is up or down to make it green or red
                    let colorClass = stock.change >= 0 ? 'green' : 'red';
                    let arrow = stock.change >= 0 ? '▲' : '▼';
                    
                    // Build the card
                    boardHTML += `
                        <div class="stock-card">
                            <div class="symbol">${stock.symbol}</div>
                            <div class="price ${colorClass}">$${stock.price.toFixed(2)}</div>
                            <div class="${colorClass}">${arrow} ${Math.abs(stock.change).toFixed(2)}%</div>
                        </div>
                    `;
                });
                
                document.getElementById('stock-board').innerHTML = boardHTML;
            } catch (error) {
                console.log("Error loading stocks: ", error);
                document.getElementById('stock-board').innerHTML = "<h2 style='color: #f85149;'>Market Data Offline. Check Backend Connection.</h2>";
            }
        }
        
        loadStocks(); // Start stocks immediately
        
        // Refresh the stock prices automatically every 60 seconds!
        setInterval(loadStocks, 60000); 
    </script>
</body>
</html>
